name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build & test
        env:
          EXECFORGE_API_TOKEN: ${{ secrets.EXECFORGE_API_TOKEN }}
        run: npx @execforge/runtime run -- "npm ci && npm test"