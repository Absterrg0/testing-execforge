name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: Absterrg0/execforge-runtime/start@v1
        env:
          EXECFORGE_API_TOKEN: ${{ secrets.EXECFORGE_API_TOKEN }}
          EXECFORGE_API_URL: ${{ secrets.EXECFORGE_API_URL }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Jest JUnit reporter
        run: npm install --save-dev jest-junit

      - name: Build & test
        run: |
          npm run build
          # Run tests with Jest JUnit reporter, outputting to junit.xml
          # The --ci flag is good for CI environments.
          # The --reporters option specifies which reporters to use.
          # We include 'default' to still see console output and 'jest-junit' for XML.
          # JEST_JUNIT_OUTPUT_DIRECTORY and JEST_JUNIT_OUTPUT_NAME env vars configure jest-junit.
          npm test -- --ci --reporters=default --reporters=jest-junit
        env:
          JEST_JUNIT_OUTPUT_DIRECTORY: ./
          JEST_JUNIT_OUTPUT_NAME: junit.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always() # Ensure artifact is uploaded even if tests fail
        with:
          name: test-results
          path: junit.xml
          retention-days: 5 # Keep artifacts for 5 days

      - uses: Absterrg0/execforge-runtime/finish@v1
        if: always()
        env:
          EXECFORGE_API_TOKEN: ${{ secrets.EXECFORGE_API_TOKEN }}
          EXECFORGE_API_URL: ${{ secrets.EXECFORGE_API_URL }}
          EXECFORGE_JOB_STATUS: ${{ job.status }}
